services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: foodsense-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.qdrant/storage:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: foodsense-backend
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env.example
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      PIP_CACHE_DIR: /workspace/.cache/pip
      PYTHONPATH: /workspace/backend
    working_dir: /workspace/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000} --reload
    volumes:
      - ./:/workspace
      - ./.cache/pip:/workspace/.cache/pip
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"

  notebook:
    build:
      context: .
      dockerfile: docker/notebook.Dockerfile
    container_name: foodsense-notebook
    profiles:
      - data
    env_file:
      - .env.example
    environment:
      PIP_CACHE_DIR: /workspace/.cache/pip
      JUPYTER_CONFIG_DIR: /workspace/.jupyter/config
      JUPYTER_DATA_DIR: /workspace/.jupyter/data
      JUPYTER_RUNTIME_DIR: /workspace/.jupyter/runtime
      IPYTHONDIR: /workspace/.ipython
      MPLCONFIGDIR: /workspace/.cache/matplotlib
    working_dir: /workspace
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser
      --ServerApp.root_dir=/workspace
      --ServerApp.token=${JUPYTER_TOKEN:-foodsense}
    volumes:
      - ./:/workspace
      - ./.cache/pip:/workspace/.cache/pip
      - ./.jupyter:/workspace/.jupyter
      - ./.ipython:/workspace/.ipython
    ports:
      - "8888:8888"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: foodsense-frontend
    profiles:
      - ui
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NPM_CONFIG_CACHE: /workspace/.cache/npm
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3000}"
    volumes:
      - ./:/workspace
      - ./.cache/npm:/workspace/.cache/npm
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"

  ollama:
    image: ollama/ollama:latest
    container_name: foodsense-ollama
    profiles:
      - llm
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./.ollama:/root/.ollama
