name: MLOps CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mlops-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets and raw data policy
        shell: bash
        run: |
          set -euo pipefail
          test -f .gitignore

          if find . -path './.git' -prune -o -type f \( -name '.env' -o -name '.env.*' \) ! -name '.env.example' -print | grep -q .; then
            echo 'Tracked env files detected. Keep secrets out of Git.'
            exit 1
          fi

          if [ -d data/raw ] && find data/raw -type f ! -name '.gitkeep' -print | grep -q .; then
            echo 'Raw data detected under data/raw. Keep raw datasets outside Git.'
            exit 1
          fi

      - name: Validate repository skeleton
        shell: bash
        run: |
          set -euo pipefail
          required_dirs=(backend frontend pipeline data docs evaluation)
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "Missing required directory: $dir"
              exit 1
            fi
          done

  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    needs: repo-hygiene
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install baseline tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Install project dependencies when manifests exist
        shell: bash
        run: |
          set -euo pipefail
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f pipeline/requirements.txt ]; then pip install -r pipeline/requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          if [ -f backend/pyproject.toml ]; then pip install -e backend; fi
          if [ -f pipeline/pyproject.toml ]; then pip install -e pipeline; fi

      - name: Run Ruff when Python sources exist
        shell: bash
        run: |
          set -euo pipefail
          if find backend pipeline -type f -name '*.py' -print | grep -q .; then
            ruff check backend pipeline
          else
            echo 'No Python sources yet. Skipping Ruff.'
          fi

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          if find backend pipeline -type f -name '*.py' -print | grep -q .; then
            python -m compileall backend pipeline
          else
            echo 'No Python sources yet. Skipping compile check.'
          fi

      - name: Run pytest when tests exist
        shell: bash
        run: |
          set -euo pipefail
          if find backend/tests pipeline -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print | grep -q .; then
            pytest -q backend/tests pipeline
          else
            echo 'No Python tests yet. Skipping pytest.'
          fi

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    needs: repo-hygiene
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip frontend checks when package.json is missing
        if: ${{ hashFiles('frontend/package.json') == '' }}
        run: echo 'No frontend/package.json yet. Skipping frontend checks.'

      - name: Install dependencies with lockfile
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        working-directory: frontend
        run: npm ci

      - name: Install dependencies without lockfile
        if: ${{ hashFiles('frontend/package-lock.json') == '' && hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        run: npm install

      - name: Run frontend lint when available
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          if npm run | grep -q ' lint'; then
            npm run lint
          else
            echo 'No lint script configured. Skipping.'
          fi

      - name: Run frontend build when available
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          if npm run | grep -q ' build'; then
            npm run build
          else
            echo 'No build script configured. Skipping.'
          fi
